<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>chat - agent-grows-up</title>
<style>
  :root {
    --bg: #faf8f3;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d8d4ca;
    --accent: #2a2a2a;
    --card: #ffffff;
    --op: #eef4ee;
    --ag: #fdf4e7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    font-size: 17px;
    line-height: 1.55;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="password"], textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 12px;
    font: inherit;
    background: #fff;
    color: var(--ink);
  }
  textarea {
    min-height: 90px;
    resize: vertical;
  }
  button {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    padding: 10px 18px;
    font: inherit;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 12px;
  }
  .err {
    color: #a23b3b;
    font-size: 14px;
    margin-top: 10px;
    min-height: 20px;
  }
  .feed {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    background: #fff;
  }
  .msg.op { background: var(--op); }
  .msg.ag { background: var(--ag); }
  .meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .body {
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .hidden { display: none; }
  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Chat</h1>
  <div class="sub">Private channel to your agent. Cookie-authed, signed
    server-side.</div>

  <section id="loginView" class="card">
    <form id="loginForm">
      <label for="pw">Operator password</label>
      <input id="pw" type="password" autocomplete="current-password" required>
      <div class="row">
        <button type="submit" id="loginBtn">Log in</button>
      </div>
      <div class="err" id="loginErr"></div>
    </form>
  </section>

  <section id="chatView" class="hidden">
    <div class="card">
      <label for="msg">Message your agent</label>
      <textarea id="msg" maxlength="4096"
        placeholder="What do you want to ask or tell it?"></textarea>
      <div class="row">
        <button id="sendBtn" type="button">Send</button>
        <button id="refreshBtn" type="button"
          style="background:#fff;color:var(--accent);">Refresh</button>
      </div>
      <div class="err" id="sendErr"></div>
    </div>

    <div class="feed" id="feed"></div>
  </section>

  <div class="footer">Self-hosted. Each forker runs their own.</div>
</div>

<script>
(function () {
  var loginView = document.getElementById("loginView");
  var chatView = document.getElementById("chatView");
  var loginForm = document.getElementById("loginForm");
  var pw = document.getElementById("pw");
  var loginBtn = document.getElementById("loginBtn");
  var loginErr = document.getElementById("loginErr");
  var msg = document.getElementById("msg");
  var sendBtn = document.getElementById("sendBtn");
  var refreshBtn = document.getElementById("refreshBtn");
  var sendErr = document.getElementById("sendErr");
  var feed = document.getElementById("feed");

  function showChat() {
    loginView.classList.add("hidden");
    chatView.classList.remove("hidden");
    loadMessages();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;",
        '"': "&quot;", "'": "&#39;"
      })[c];
    });
  }

  function fmtTime(ts) {
    try {
      var d = new Date(Number(ts));
      return d.toLocaleString();
    } catch (e) {
      return String(ts);
    }
  }

  function render(messages) {
    feed.innerHTML = "";
    if (!messages || !messages.length) {
      feed.innerHTML =
        '<div class="msg"><div class="body">No messages yet. Send one above.</div></div>';
      return;
    }
    messages.forEach(function (m) {
      var div = document.createElement("div");
      div.className = "msg " + (m.from === "agent" ? "ag" : "op");
      div.innerHTML =
        '<div class="meta"><span>' +
        (m.from === "agent" ? "Agent" : "You") +
        '</span><span>' + escapeHtml(fmtTime(m.ts)) + '</span></div>' +
        '<div class="body">' + escapeHtml(m.text || "") + '</div>';
      feed.appendChild(div);
    });
  }

  function loadMessages() {
    fetch("/api/messages", { credentials: "same-origin" })
      .then(function (r) {
        if (r.status === 401) {
          chatView.classList.add("hidden");
          loginView.classList.remove("hidden");
          throw new Error("not logged in");
        }
        return r.json();
      })
      .then(function (data) {
        render(data.messages || []);
      })
      .catch(function (e) {
        if (String(e.message) !== "not logged in") {
          sendErr.textContent = "Could not load messages: " + e.message;
        }
      });
  }

  loginForm.addEventListener("submit", function (e) {
    e.preventDefault();
    loginErr.textContent = "";
    loginBtn.disabled = true;
    fetch("/api/login", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw.value })
    })
      .then(function (r) {
        if (r.ok) {
          pw.value = "";
          showChat();
        } else {
          loginErr.textContent = "Wrong password.";
        }
      })
      .catch(function (e) {
        loginErr.textContent = "Login failed: " + e.message;
      })
      .finally(function () {
        loginBtn.disabled = false;
      });
  });

  sendBtn.addEventListener("click", function () {
    sendErr.textContent = "";
    var text = (msg.value || "").trim();
    if (!text) {
      sendErr.textContent = "Empty message.";
      return;
    }
    if (text.length > 4096) {
      sendErr.textContent = "Too long (4096 char limit).";
      return;
    }
    sendBtn.disabled = true;
    fetch("/api/send", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    })
      .then(function (r) {
        if (r.status === 401) {
          chatView.classList.add("hidden");
          loginView.classList.remove("hidden");
          throw new Error("session expired");
        }
        if (!r.ok) {
          return r.json().then(function (j) {
            throw new Error(j.error || "send failed");
          });
        }
        msg.value = "";
        loadMessages();
      })
      .catch(function (e) {
        sendErr.textContent = e.message;
      })
      .finally(function () {
        sendBtn.disabled = false;
      });
  });

  refreshBtn.addEventListener("click", loadMessages);

  // Probe session on load. If valid cookie, jump straight to chat.
  fetch("/api/messages", { credentials: "same-origin" }).then(function (r) {
    if (r.ok) {
      showChat();
    }
  });
})();
</script>
</body>
</html>
